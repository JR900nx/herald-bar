<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>App Icon — 1200x1200</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { width: 1200px; height: 1200px; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #0e0e12; }

  .icon-wrap { width: 1200px; height: 1200px; background: linear-gradient(145deg, #1a1a24 0%, #0e0e14 100%); display: flex; align-items: center; justify-content: center; position: relative; }

  /* Decorative background bars */
  .bg-bar { position: absolute; left: 0; right: 0; height: 90px; display: flex; align-items: center; justify-content: center; opacity: 0.07; }
  .bg-bar-1 { top: 200px; background: #fff; }
  .bg-bar-2 { top: 340px; background: #fff; }
  .bg-bar-3 { top: 480px; background: #fff; }

  /* Main icon content */
  .icon-content { display: flex; flex-direction: column; align-items: center; gap: 0; z-index: 1; }

  /* The stylised announcement bar graphic */
  .bar-graphic { width: 640px; background: #fff; border-radius: 16px; padding: 30px 40px; display: flex; align-items: center; justify-content: center; gap: 20px; box-shadow: 0 40px 120px rgba(0,0,0,0.5); }
  .bar-graphic .msg { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; font-size: 26px; font-weight: 600; color: #1a1a1a; white-space: nowrap; }
  .bar-graphic .pill { background: #1a1a1a; color: #fff; padding: 10px 24px; border-radius: 8px; font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; font-size: 22px; font-weight: 700; white-space: nowrap; }

  /* Text below */
  .app-name { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; font-size: 80px; font-weight: 800; color: #fff; letter-spacing: -3px; margin-top: 60px; }
  .app-sub { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; font-size: 32px; color: #555; margin-top: 12px; letter-spacing: 0; font-weight: 400; }

  /* Glow */
  .glow { position: absolute; width: 500px; height: 200px; background: radial-gradient(ellipse, rgba(255,255,255,0.06) 0%, transparent 70%); top: 50%; left: 50%; transform: translate(-50%, -60%); pointer-events: none; }
</style>
</head>
<body>
<div class="icon-wrap">
  <div class="bg-bar bg-bar-1"></div>
  <div class="bg-bar bg-bar-2"></div>
  <div class="bg-bar bg-bar-3"></div>
  <div class="glow"></div>
  <div class="icon-content">
    <div class="bar-graphic">
      <span class="msg">Free shipping over $50</span>
      <span class="pill">Shop now</span>
    </div>
    <div class="app-name">Herald Bar</div>
  </div>
</div>
</body>
</html>
